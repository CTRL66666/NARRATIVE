<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加载中...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/shared/novel-skeleton.css">
  <link rel="stylesheet" href="./src/shared/nav.css">
  <link rel="stylesheet" href="./src/shared/vinyl-player.css">
  <link rel="stylesheet" href="./src/shared/themes.css">
  <script>
  // ===== BGM 预加载（在 JS 模块加载前就开始）=====
  // 用 Audio 元素预加载，确保与主 <audio id="bgm"> 共享浏览器缓存
  (function() {
    var p = new URLSearchParams(location.search);
    var id = p.get('id');
    var ch = parseInt(p.get('ch')) || 0;
    if (!id) return;

    // 故事 ID → BGM URL 映射（与 config.json 和 data.json 保持一致）
    var BGM_MAP = {
      'story1': {
        'default': './audio/见字如面.mp3',
        'chapters': { '2': './audio/折戸伸治 - 鸟之诗 (八音盒版).mp3' }
      },
      'story2': { 'default': 'https://cdn.pixabay.com/download/audio/2022/10/25/audio_111422.mp3' },
      'story3': { 'default': 'https://cdn.pixabay.com/download/audio/2022/11/15/audio_111422.mp3' }
    };

    var story = BGM_MAP[id];
    if (!story) return;

    var url = (story.chapters && story.chapters[ch]) || story.default;
    if (!url) return;

    // 用 Audio 元素预加载，和主 audio 元素完全相同的缓存机制
    var a = new Audio();
    a.preload = 'auto';
    a.src = url;
    a.load();

    // 记录到全局，供 JS 检测
    window.__preloadedBgm = url;
    window.__preloadedBgmReady = false;
    a.addEventListener('canplay', function() {
      window.__preloadedBgmReady = true;
    }, { once: true });
  })();
  </script>
</head>
<body>
  <!-- 背景效果容器（动态插入） -->
  <div id="bgEffects"></div>

  <!-- 左上角唱片播放器 -->
  <div class="vinyl-player">
    <div class="vinyl-disc" id="vinylDisc" title="点击播放/暂停">
      <div class="vinyl-label-text" id="vinylLabel">BGM</div>
      <div class="vinyl-play-icon"></div>
      <div class="vinyl-pause-icon">
        <span></span><span></span>
      </div>
    </div>
    <span class="vinyl-hint">BGM</span>
  </div>
  <audio id="bgm" loop preload="auto"></audio>

  <nav class="story-nav">
    <a href="./index.html" class="nav-back">← 返回书架</a>
    <div class="nav-center">
      <span class="story-tag" id="storyTag">标签</span>
      <span class="story-nav-title" id="storyTitle">标题</span>
    </div>
    <a href="#" class="nav-next" id="nextLink">下一篇 →</a>
  </nav>

  <main class="novel-page">
    <div class="novel-paper">
      <div class="novel-gutter"></div>
      <header class="novel-header"></header>
      <article class="novel-content"></article>
    </div>
  </main>

  <section class="novel-nav-footer"></section>

  <section class="comments-section">
    <h2 class="comments-title">读者留言</h2>
    <div class="comments-container" id="commentsContainer">
      <p class="comments-loading">正在加载评论……</p>
    </div>
    <form class="comment-form" id="commentForm">
      <h3>写下你的留言</h3>
      <input type="text" id="commentName" placeholder="你的昵称（选填）" maxlength="30">
      <textarea id="commentText" placeholder="写下你的感想……" required maxlength="500" rows="4"></textarea>
      <div class="comment-form-footer">
        <span class="comment-tip">评论将存储在 GitHub 中</span>
        <button type="submit" class="comment-submit">发表留言</button>
      </div>
    </form>
  </section>

  <footer class="story-footer">
    <p> 我的故事集</p>
    <p class="version-mark">v1.0.19</p>
  </footer>

  <!-- 音频播放弹窗（自动播放失败时显示） -->
  <div id="bgmModal" class="bgm-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;justify-content:center;align-items:center;">
    <div class="bgm-modal-content" style="background:#fff;padding:24px 32px;border-radius:12px;text-align:center;max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,0.3);">
      <p style="margin:0 0 16px 0;font-size:15px;color:#333;line-height:1.6;">自动播放音乐失败<br>建议您点击下方打开音乐</p>
      <button id="bgmModalBtn" style="padding:10px 28px;background:#8B4513;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">打开音乐</button>
    </div>
  </div>

  <script type="module" src="./src/shared/story-loader.js"></script>
</body>
</html>
