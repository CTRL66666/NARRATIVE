<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加载中...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/shared/novel-skeleton.css">
  <link rel="stylesheet" href="./src/shared/nav.css">
  <link rel="stylesheet" href="./src/shared/vinyl-player.css">
  <link rel="stylesheet" href="./src/shared/themes.css">
</head>
<body>
  <!-- 背景效果容器（动态插入） -->
  <div id="bgEffects"></div>

  <!-- 左上角唱片播放器 -->
  <div class="vinyl-player">
    <div class="vinyl-disc" id="vinylDisc" title="点击播放/暂停">
      <div class="vinyl-label-text" id="vinylLabel">BGM</div>
      <div class="vinyl-play-icon"></div>
      <div class="vinyl-pause-icon">
        <span></span><span></span>
      </div>
    </div>
    <span class="vinyl-hint">BGM</span>
  </div>
  <audio id="bgm" loop preload="auto"></audio>
  <script>
  // BGM 预加载：在 JS 模块加载前预加载所有 BGM，确保切换时秒开
  (function() {
    var p = new URLSearchParams(location.search);
    var id = p.get('id');
    var ch = parseInt(p.get('ch')) || 0;
    if (!id) return;
    
    var BGM_MAP = {
      'story1': {
        'default': 'https://cdn.jsdelivr.net/gh/CTRL66666/NARRATIVE@main/public/audio/见字如面.mp3',
        'chapters': { '2': 'https://cdn.jsdelivr.net/gh/CTRL66666/NARRATIVE@main/public/audio/折戸伸治 - 鸟之诗 (八音盒版).mp3' }
      },
      'story2': { 'default': 'https://cdn.jsdelivr.net/gh/CTRL66666/NARRATIVE@main/public/audio/见字如面.mp3' },
      'story3': { 'default': 'https://cdn.jsdelivr.net/gh/CTRL66666/NARRATIVE@main/public/audio/见字如面.mp3' }
    };
    
    var story = BGM_MAP[id];
    if (!story) return;
    
    // 收集所有 BGM URL（去重）
    var urls = [];
    if (story.default) urls.push(story.default);
    if (story.chapters) {
      Object.keys(story.chapters).forEach(function(k) {
        if (urls.indexOf(story.chapters[k]) === -1) {
          urls.push(story.chapters[k]);
        }
      });
    }
    
    // 预加载所有 BGM（后台静默加载）
    urls.forEach(function(url) {
      var a = new Audio();
      a.crossOrigin = 'anonymous';
      a.preload = 'auto';
      a.src = url;
      a.load();
    });
    
    // 同时给主 audio 设置当前章节的 BGM
    var currentUrl = (story.chapters && story.chapters[ch]) || story.default;
    if (currentUrl) {
      var bgm = document.getElementById('bgm');
      if (bgm) {
        bgm.src = currentUrl;
        bgm.load();
      }
    }
  })();
  </script>

  <nav class="story-nav">
    <a href="./index.html" class="nav-back">← 返回书架</a>
    <div class="nav-center">
      <span class="story-tag" id="storyTag">标签</span>
      <span class="story-nav-title" id="storyTitle">标题</span>
    </div>
    <a href="#" class="nav-next" id="nextLink">下一篇 →</a>
  </nav>

  <main class="novel-page">
    <div class="novel-paper">
      <div class="novel-gutter"></div>
      <header class="novel-header"></header>
      <article class="novel-content"></article>
    </div>
  </main>

  <section class="novel-nav-footer"></section>

  <section class="comments-section">
    <h2 class="comments-title">读者留言</h2>
    <div class="comments-container" id="commentsContainer">
      <p class="comments-loading">正在加载评论……</p>
    </div>
    <form class="comment-form" id="commentForm">
      <h3>写下你的留言</h3>
      <input type="text" id="commentName" placeholder="你的昵称（选填）" maxlength="30">
      <textarea id="commentText" placeholder="写下你的感想……" required maxlength="500" rows="4"></textarea>
      <div class="comment-form-footer">
        <span class="comment-tip">评论将存储在 GitHub 中</span>
        <button type="submit" class="comment-submit">发表留言</button>
      </div>
    </form>
  </section>

  <footer class="story-footer">
    <p> 我的故事集</p>
    <p class="version-mark">v1.0.19</p>
  </footer>

  <!-- 底部非阻塞提示条（自动播放失败时显示） -->
  <div id="bgmToast" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:9999;cursor:pointer;transition:opacity 0.3s;opacity:0;pointer-events:auto;box-shadow:0 4px 16px rgba(0,0,0,0.3);white-space:nowrap;">
    🎵 点击播放音乐
  </div>

  <script type="module" src="./src/shared/story-loader.js"></script>
</body>
</html>
