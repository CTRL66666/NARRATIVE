<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>故事阅读</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/shared/novel-skeleton.css">
  <link rel="stylesheet" href="./src/shared/nav.css">
  <link rel="stylesheet" href="./src/shared/vinyl-player.css">
  <link rel="stylesheet" href="./src/shared/themes.css">
  <script type="module" src="./src/shared/story-loader.js"></script>
  <style>
    /* 播放按钮脉冲提示 */
    .hint-pulse { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 5px rgba(255,255,255,0.3); }
      50% { box-shadow: 0 0 20px rgba(255,255,255,0.8); }
    }
    /* 弹窗样式 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #2a1f1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      max-width: 320px;
    }
    .modal-content h3 { margin: 0 0 12px; color: #e8d8c8; font-size: 1.1rem; }
    .modal-content p { margin: 0 0 20px; color: rgba(232,216,200,0.7); font-size: 0.9rem; }
    .modal-btn {
      background: #8a5e3c;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 10px 24px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .modal-btn:hover { background: #a07050; }
  </style>
</head>
<body data-story="story1">
  <div class="bg-animation" id="bgAnimation"></div>

  <div class="modal-overlay" id="bgmModal">
    <div class="modal-content">
      <h3>🎵 开启音乐体验</h3>
      <p>点击按钮开始播放故事背景乐</p>
      <button class="modal-btn" id="bgmModalBtn">播放音乐</button>
    </div>
  </div>

  <div class="page-flip-overlay" id="pageFlipOverlay">
    <div class="page-flip-book">
      <div class="page-flip-left"></div>
      <div class="page-flip-right"></div>
    </div>
  </div>

  <div class="story-wrapper" id="storyWrapper">
    <div class="story-container" id="storyContent"></div>
  </div>

  <div class="page-markers" id="pageMarkers"></div>
  
  <div class="nav-controls">
    <button class="nav-btn" id="prevBtn" title="上一页 (←)">
      <svg viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
    </button>
    <div class="vinyl-container" id="vinylContainer" title="点击暂停/播放">
      <div class="vinyl-disc" id="vinylDisc">
        <div class="vinyl-label" id="vinylLabel">加载中...</div>
      </div>
    </div>
    <button class="nav-btn" id="nextBtn" title="下一页 (→)">
      <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
    </button>
  </div>

  <a href="index.html" class="back-btn" title="返回书架">← 返回书架</a>
  <audio id="bgm" loop></audio>

  <footer class="site-footer" style="position: fixed; bottom: 8px; right: 16px; opacity: 0.5;">
    <p class="version-mark">v1.0.17</p>
  </footer>
</body>
</html>
